  Capability:
    name: Capability
    definition_uri: https://w3id.org/ai-atlas-nexus/Capability
    description: 'A specific AI capability or ability, such as reading comprehension,
      logical reasoning, or code generation. Aligned with the W3C DPV AI extension
      dpv-ai:Capability, representing what an AI technology is capable of achieving
      or providing.

      Capabilities are distinct from: (1) the intended purpose for which the technology
      is designed, (2) the actual tasks performed in a specific deployment context,
      and (3) the technical implementation mechanisms (intrinsics, adapters) that
      enable the capability.'
    from_schema: https://w3id.org/ai-atlas-nexus/ai_capability
    mappings:
    - ai:Capability
    broad_mappings:
    - tech:Capability
    is_a: Entry
    mixins:
    - CapabilityConcept
    slots:
    - id
    - name
    - description
    - url
    - dateCreated
    - dateModified
