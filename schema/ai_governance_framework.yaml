    - schema:url
    slot_uri: schema:url
    owner: Entity
    domain_of:
    - Entity
    range: uri
  dateCreated:
    name: dateCreated
    definition_uri: https://w3id.org/ai-atlas-nexus/dateCreated
    description: The date on which the entity was created.
    from_schema: https://w3id.org/ai-atlas-nexus/common
    mappings:
    - schema:dateCreated
    slot_uri: schema:dateCreated
    owner: Entity
    domain_of:
    - Entity
    range: date
    required: false
  dateModified:
    name: dateModified
    definition_uri: https://w3id.org/ai-atlas-nexus/dateModified
    description: The date on which the entity was most recently modified.
    from_schema: https://w3id.org/ai-atlas-nexus/common
    mappings:
    - schema:dateModified
    slot_uri: schema:dateModified
    owner: Entity
    domain_of:
    - Entity
    range: date
    required: false
  version:
    name: version
    definition_uri: https://w3id.org/ai-atlas-nexus/version
    description: The version of the entity embodied by a specified resource.
    from_schema: https://w3id.org/ai-atlas-nexus/common
    mappings:
