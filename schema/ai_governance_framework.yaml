types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string. If you are authoring schemas in LinkML YAML, the type is referenced
      with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  Jurisdiction:
    name: Jurisdiction
    definition_uri: https://w3id.org/ai-atlas-nexus/Jurisdiction
    description: 'A legal or political jurisdiction. Primary values are ISO 3166-1
      alpha-2 country codes sourced from the DPV Location ontology (https://w3id.org/dpv/loc)
      as subclasses of dpv:Country. Additional permissible values cover supranational
      scopes (EU, INTL, GLOBAL) and long-form aliases used by FINOS source data (UK
      as alias for GB, International as alias for INTL). FINOS-LOCAL: the permissible_values
      extensions are awaiting upstream adoption (see ISSUE-nexus.md G29).'
    from_schema: https://w3id.org/ai-atlas-nexus/common
    permissible_values:
      US:
        text: US
        description: United States (ISO 3166-1 alpha-2).
      UK:
        text: UK
        description: "United Kingdom \u2014 long-form alias for GB used by FINOS source\
          \ data."
      EU:
        text: EU
        description: European Union (supranational scope).
      International:
        text: International
        description: International scope, transcending national borders (alias for
          INTL).
      INTL:
        text: INTL
        description: International scope, not bound to a single ISO 3166-1 country.
      GLOBAL:
        text: GLOBAL
        description: Global scope.
    reachable_from:
      source_ontology: dpv_loc
      source_nodes:
      - dpv:Country
      relationship_types:
      - rdfs:subClassOf
      include_self: false
  AdapterType:
    name: AdapterType
    definition_uri: https://w3id.org/ai-atlas-nexus/AdapterType
    from_schema: https://w3id.org/ai-atlas-nexus/ai_intrinsic
    permissible_values:
      LORA:
        text: LORA
        description: Low-rank adapters, or LoRAs, are a fast way to give generalist
          large language models targeted knowledge and skills so they can do things
          like summarize IT manuals or rate the accuracy of their own answers. LoRA
          reduces the number of trainable parameters by learning pairs of rank-decompostion
          matrices while freezing the original weights. This vastly reduces the storage
          requirement for large language models adapted to specific tasks and enables
          efficient task-switching during deployment all without introducing inference
          latency. LoRA also outperforms several other adaptation methods including
          adapter, prefix-tuning, and fine-tuning. See arXiv:2106.09685
      ALORA:
        text: ALORA
        description: Activated LoRA (aLoRA) is a low rank adapter architecture that
          allows for reusing existing base model KV cache for more efficient inference,
          unlike standard LoRA models. As a result, aLoRA models can be quickly invoked
          as-needed for specialized tasks during (long) flows where the base model
          is primarily used, avoiding potentially expensive prefill costs in terms
          of latency, throughput, and GPU memory. See arXiv:2504.12397 for further
          details.
      X-LORA:
        text: X-LORA
        description: Mixture of LoRA Experts (X-LoRA) is a mixture of experts method
          for LoRA which works by using dense or sparse gating to dynamically activate
          LoRA experts.
  AIUC1ApplicationCategory:
    name: AIUC1ApplicationCategory
    definition_uri: https://w3id.org/ai-atlas-nexus/AIUC1ApplicationCategory
    from_schema: https://w3id.org/ai-atlas-nexus/ai_aiuc
    permissible_values:
      MANDATORY:
        text: MANDATORY
        description: Mandatory
      OPTIONAL:
        text: OPTIONAL
        description: Optional
  AIUC1ControlApplicationCategory:
    name: AIUC1ControlApplicationCategory
    definition_uri: https://w3id.org/ai-atlas-nexus/AIUC1ControlApplicationCategory
    from_schema: https://w3id.org/ai-atlas-nexus/ai_aiuc
    permissible_values:
      CORE:
        text: CORE
        description: Core Control
      SUPPLEMENTAL:
        text: SUPPLEMENTAL
        description: Supplemental Control
  AIUC1EvidenceCategory:
    name: AIUC1EvidenceCategory
    definition_uri: https://w3id.org/ai-atlas-nexus/AIUC1EvidenceCategory
    from_schema: https://w3id.org/ai-atlas-nexus/ai_aiuc
    permissible_values:
      TECHNICAL_IMPLEMENTATION:
        text: TECHNICAL_IMPLEMENTATION
        description: Technical Implementation
      LEGAL_POLICIES:
        text: LEGAL_POLICIES
        description: Legal Policies
      OPERATIONAL_PRACTICES:
        text: OPERATIONAL_PRACTICES
        description: Operational Practices
      THIRD_PARTY_EVALS:
        text: THIRD_PARTY_EVALS
        description: Third-party Evals
  AIUC1Frequency:
    name: AIUC1Frequency
    definition_uri: https://w3id.org/ai-atlas-nexus/AIUC1Frequency
    from_schema: https://w3id.org/ai-atlas-nexus/ai_aiuc
    permissible_values:
      MONTHS_3:
        text: MONTHS_3
        description: Every 3 months
      MONTHS_6:
        text: MONTHS_6
        description: Every 6 months
      MONTHS_12:
        text: MONTHS_12
        description: Every 12 months
  AIUC1RequirementType:
    name: AIUC1RequirementType
    definition_uri: https://w3id.org/ai-atlas-nexus/AIUC1RequirementType
    from_schema: https://w3id.org/ai-atlas-nexus/ai_aiuc
    permissible_values:
      DETECTIVE:
        text: DETECTIVE
        description: Detective
      PREVENTATIVE:
        text: PREVENTATIVE
        description: Preventative
  EuAiRiskCategory:
    name: EuAiRiskCategory
    definition_uri: https://w3id.org/ai-atlas-nexus/EuAiRiskCategory
    from_schema: https://w3id.org/ai-atlas-nexus/eu_ai_act
    permissible_values:
      EXCLUDED:
        text: EXCLUDED
        description: Excluded
      PROHIBITED:
        text: PROHIBITED
        description: Prohibited
      HIGH_RISK_EXCEPTION:
        text: HIGH_RISK_EXCEPTION
        description: High-Risk Exception
      HIGH_RISK:
        text: HIGH_RISK
        description: High Risk
      LIMITED_OR_LOW_RISK:
        text: LIMITED_OR_LOW_RISK
        description: Limited or Low Risk
  AiSystemType:
    name: AiSystemType
    definition_uri: https://w3id.org/ai-atlas-nexus/AiSystemType
    from_schema: https://w3id.org/ai-atlas-nexus/eu_ai_act
    permissible_values:
      GPAI:
        text: GPAI
        description: General-purpose AI (GPAI)
      GPAI_OS:
        text: GPAI_OS
        description: General-purpose AI (GPAI) models released under free and open-source
          licences
      PROHIBITED:
        text: PROHIBITED
        description: Prohibited AI system due to unacceptable risk category (e.g.
          social scoring systems and manipulative AI).
      SCIENTIFIC_RD:
        text: SCIENTIFIC_RD
        description: AI used for scientific research and development
      MILITARY_SECURITY:
        text: MILITARY_SECURITY
        description: AI used for military, defense and security purposes.
      HIGH_RISK:
        text: HIGH_RISK
        description: AI systems pursuant to Article 6(1)(2) Classification Rules for
          High-Risk AI Systems
slots:
  id:
    name: id
    definition_uri: https://w3id.org/ai-atlas-nexus/id
    description: A unique identifier to this instance of the model element. Example
      identifiers include UUID, URI, URN, etc.
    from_schema: https://w3id.org/ai-atlas-nexus/common
    mappings:
    - schema:identifier
    slot_uri: schema:identifier
    identifier: true
    owner: Entity
    domain_of:
    - Entity
    range: string
    required: true
  isDefinedByVocabulary:
    name: isDefinedByVocabulary
    definition_uri: https://w3id.org/ai-atlas-nexus/isDefinedByVocabulary
    description: A relationship where a term or a term group is defined by a vocabulary
    from_schema: https://w3id.org/ai-atlas-nexus/common
    mappings:
    - schema:isPartOf
    slot_uri: schema:isPartOf
    owner: LLMIntrinsic
    domain_of:
    - Entry
    - Term
    - Adapter
    - LLMIntrinsic
    range: Vocabulary
  name:
    name: name
    definition_uri: https://w3id.org/ai-atlas-nexus/name
    description: A text name of this instance.
    from_schema: https://w3id.org/ai-atlas-nexus/common
    mappings:
    - schema:name
    slot_uri: schema:name
    owner: Entity
    domain_of:
    - Entity
    range: string
  description:
    name: description
    definition_uri: https://w3id.org/ai-atlas-nexus/description
    description: The description of an entity
    from_schema: https://w3id.org/ai-atlas-nexus/common
    mappings:
    - schema:description
    slot_uri: schema:description
    owner: Entity
    domain_of:
    - Entity
    range: string
  url:
    name: url
    definition_uri: https://w3id.org/ai-atlas-nexus/url
    description: An optional URL associated with this instance.
    from_schema: https://w3id.org/ai-atlas-nexus/common
