    - requiresCapability
    - hasRule
    - entry__type
    - Capability_requiredByTask
    - Capability_implementedByAdapter
    - Capability_isPartOf
    - hasJurisdiction
    slot_usage:
      isPartOf:
        name: isPartOf
        description: A relationship where a capability is part of a capability group
        range: CapabilityGroup
      requiredByTask:
        name: requiredByTask
        description: Indicates that this capability is required to perform a specific
          AI task. This links abstract capabilities (technical abilities) to concrete
          tasks (application-level operations). An AI system with this capability
          can perform tasks that require it.
        range: AiTask
      implementedByAdapter:
        name: implementedByAdapter
        description: Indicates that this capability is implemented by a specific adapter.
          This relationship distinguishes the abstract capability (what can be done)
          from the technical implementation mechanism (how it is added/extended via
          adapters).
        domain: Capability
        range: Adapter
