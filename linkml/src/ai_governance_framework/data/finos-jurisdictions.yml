# FINOS controlled vocabulary of legal/political jurisdictions cited by
# regulatory references across the AI Governance Framework catalogue.
#
# Each `code` becomes one `Term` (id: `jurisdiction-<code-slug>`) under
# the `finos-jurisdictions` `Vocabulary`. Terms are emitted by
# `linkml/scripts/build_finos_data.py` (DocRegistry.ensure_jurisdiction)
# and surface in `Container.entries`.
#
# Codes are also used as values of the `hasJurisdiction:` slot on
# `Documentation` rows (e.g. regulatory citations carried in
# `references[*]` arrays of `docs/_data/data_classification.yml`).
#
# The 4 codes below are the closed set actually cited by FINOS source
# data (US, EU, UK, International). The codes also appear as
# `permissible_values:` of the `Jurisdiction` enum in the vendored
# ai-atlas-nexus `common.yaml` (locally extended — see ISSUE-nexus.md
# G29). Maintainers: when adding a new code here, also update the enum
# and `JURISDICTION_LABELS` in `build_finos_data.py`.

finos_jurisdictions:

  - code: US
    name: United States
    description: >-
      Legal and regulatory jurisdiction of the United States of America.
      Covers federal regulators (SEC, OCC, Federal Reserve, FFIEC, CFPB,
      FTC) and federal statutes (SOX, GLBA, ECOA, Fair Lending, HIPAA,
      Privacy Act).
    iso_3166_1_alpha_2: US
    references:
      - name: "ISO 3166-1 alpha-2: US"
        url: "https://www.iso.org/obp/ui/#iso:code:3166:US"

  - code: EU
    name: European Union
    description: >-
      Supranational legal and regulatory jurisdiction of the European
      Union. Covers EU regulations (GDPR, EU AI Act, DORA) and
      directives binding on all member states. Not an ISO 3166-1
      country code; EU is the conventional alpha-2 code for the union.
    iso_3166_1_alpha_2: null
    references:
      - name: "EU AI Act (Regulation (EU) 2024/1689)"
        url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R1689"

  - code: UK
    name: United Kingdom
    description: >-
      Legal and regulatory jurisdiction of the United Kingdom of Great
      Britain and Northern Ireland. Covers UK statutes (UK GDPR, Data
      Protection Act 2018) and UK regulators (FCA, PRA, ICO). FINOS
      uses `UK` as a long-form alias; the ISO 3166-1 alpha-2 code is
      `GB`.
    iso_3166_1_alpha_2: GB
    references:
      - name: "ISO 3166-1 alpha-2: GB"
        url: "https://www.iso.org/obp/ui/#iso:code:3166:GB"

  - code: International
    name: International
    description: >-
      Jurisdiction transcending national borders — international
      standards bodies and recommendations (BCBS, BIS, IOSCO, FATF,
      ISO/IEC, NIST when adopted internationally). FINOS uses
      `International` as a long-form alias for the supranational scope
      coded as `INTL`.
    iso_3166_1_alpha_2: null
    references:
      - name: "BCBS 239 — Principles for effective risk data aggregation and risk reporting"
        url: "https://www.bis.org/publ/bcbs239.htm"
