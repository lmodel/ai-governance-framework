id: AIR-RC-001


name: Information Leaked To Hosted Model


description: >-
  Using third-party hosted LLMs creates a two-way trust boundary where neither inputs
  nor outputs can be fully trusted. Sensitive financial data sent for inference
  may be memorized by models, leaked through prompt attacks, or exposed via inadequate
  provider controls. This risks exposing customer PII, proprietary algorithms, and
  confidential business information, particularly with free or poorly-governed LLM
  services.


