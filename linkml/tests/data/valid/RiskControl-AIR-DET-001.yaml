id: AIR-DET-001


name: AI Data Leakage Prevention and Detection


description: >-
  Data Leakage Prevention and Detection (DLP&D) for Artificial Intelligence (AI)
  systems encompasses a combination of proactive measures to prevent sensitive data
  from unauthorized egress or exposure through these systems, and detective measures
  to identify such incidents promptly if they occur. This control is critical for
  safeguarding various types of information associated with AI, including:
   Session Data: Information exchanged during interactions with AI models (e.g.,
  user prompts, model responses, intermediate data).
   Training Data: Proprietary or sensitive datasets used to train or fine-tune AI
  models.
   Model Intellectual Property: The AI models themselves (weights, architecture)
  which represent significant intellectual property.


